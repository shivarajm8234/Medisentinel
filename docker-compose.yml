version: "3.9"

services:
  # ─── Infrastructure ───────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: medisentinel-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - medisentinel-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: medisentinel-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - medisentinel-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 10

  mqtt-broker:
    image: eclipse-mosquitto:2.0
    container_name: medisentinel-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./infrastructure/mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto-data:/mosquitto/data
      - mosquitto-logs:/mosquitto/log
    networks:
      - medisentinel-net
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "test", "-m", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend ──────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: medisentinel-backend
    depends_on:
      kafka:
        condition: service_healthy
      mqtt-broker:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - MQTT_BROKER_HOST=mqtt-broker
      - MQTT_BROKER_PORT=1883
      - SECRET_KEY=${SECRET_KEY:-medisentinel_super_secret_key_change_in_prod}
      - DATABASE_URL=sqlite:///./medisentinel.db
    volumes:
      - ./backend:/app
      - backend-data:/app/data
    networks:
      - medisentinel-net
    restart: unless-stopped

  # ─── Agents ───────────────────────────────────────────────────────
  agents:
    build:
      context: ./agents
      dockerfile: Dockerfile
    container_name: medisentinel-agents
    depends_on:
      kafka:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - BACKEND_URL=http://backend:8000
    volumes:
      - ./agents:/app
    networks:
      - medisentinel-net
    restart: unless-stopped

  # ─── Frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medisentinel-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - medisentinel-net
    restart: unless-stopped

volumes:
  mosquitto-data:
  mosquitto-logs:
  backend-data:

networks:
  medisentinel-net:
    driver: bridge
